name: MediFlow CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_BACKEND:    ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mediflow/backend
  ECR_FRONTEND:   ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mediflow/frontend

jobs:

  # ─────────────────────────────────────────────────────────
  # Job 1 — Test
  # Runs on every push and PR — catches bugs before build
  # ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend (type check)
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:3001/api/v1

  # ─────────────────────────────────────────────────────────
  # Job 2 — Build & Push to ECR
  # Only runs on main branch push — not on PRs
  # ─────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test                         # waits for test to pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        working-directory: backend
        run: |
          docker build \
            --target production \
            --tag $ECR_BACKEND:${{ steps.meta.outputs.tag }} \
            --tag $ECR_BACKEND:latest \
            .
          docker push $ECR_BACKEND:${{ steps.meta.outputs.tag }}
          docker push $ECR_BACKEND:latest

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          docker build \
            --target production \
            --build-arg REACT_APP_API_URL=http://mediflow-alb-669746895.ap-south-1.elb.amazonaws.com/api/v1 \
            --tag $ECR_FRONTEND:${{ steps.meta.outputs.tag }} \
            --tag $ECR_FRONTEND:latest \
            .
          docker push $ECR_FRONTEND:${{ steps.meta.outputs.tag }}
          docker push $ECR_FRONTEND:latest
      - name: Scan backend image for vulnerabilities
        run: |
          aws ecr wait image-scan-complete \
            --repository-name mediflow/backend \
            --image-id imageTag=${{ steps.meta.outputs.tag }} \
            --region $AWS_REGION || true

  # ─────────────────────────────────────────────────────────
  # Job 3 — Deploy to EC2
  # SSHes into EC2, pulls new images, restarts containers
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Install SSM plugin
        run: |
          curl --silent --location \
            "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Deploy via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mediflow-app-server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Deploying to instance: $INSTANCE_ID"

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com",
              "docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mediflow/backend:latest",
              "docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mediflow/frontend:latest",
              "cd /home/ec2-user/mediflow && export IMAGE_TAG=latest && export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }} && export AWS_REGION=${{ secrets.AWS_REGION }} && docker-compose -f docker-compose.prod.yml up -d --remove-orphans",
              "docker image prune -f",
              "echo Deployment complete"
            ]' \
            --comment "Deploy from GitHub Actions ${{ github.sha }}" \
            --output text \
            --query "Command.CommandId"